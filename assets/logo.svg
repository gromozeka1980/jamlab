<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.32" r="1.1">
      <stop offset="0" stop-color="#26355f"/>
      <stop offset="0.55" stop-color="#141a38"/>
      <stop offset="1" stop-color="#0b0e1e"/>
    </radialGradient>
    <linearGradient id="stem" x1="440" y1="720" x2="620" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4dd0e1"/>
      <stop offset="0.6" stop-color="#69db7c"/>
      <stop offset="1" stop-color="#ffd43b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <!-- eighth note: stem + flag as neon strokes -->
  <g filter="url(#glow)" fill="none" stroke="url(#stem)" stroke-width="64" stroke-linecap="round">
    <path d="M505 676 L505 268"/>
    <path d="M505 268 C 650 320, 700 430, 655 560"/>
  </g>
  <!-- note head -->
  <g filter="url(#bigglow)">
    <ellipse cx="400" cy="690" rx="140" ry="108" fill="#ffd43b" transform="rotate(-20 400 690)"/>
  </g>
  <ellipse cx="400" cy="690" rx="140" ry="108" fill="#ffd43b" transform="rotate(-20 400 690)"/>
  <ellipse cx="352" cy="650" rx="40" ry="28" fill="#fff3bf" opacity="0.85" transform="rotate(-20 352 650)"/>
</svg>
