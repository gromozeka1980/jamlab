<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.32" r="1.1">
      <stop offset="0" stop-color="#221a4e"/>
      <stop offset="0.55" stop-color="#120e2e"/>
      <stop offset="1" stop-color="#0a0818"/>
    </radialGradient>
    <linearGradient id="head" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#a98fff"/>
      <stop offset="0.5" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#4630b0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f74ff"/>
      <stop offset="0.55" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#5236c8"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b39dff"/>
      <stop offset="1" stop-color="#5b3fd4"/>
    </linearGradient>
    <radialGradient id="bub" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#cfc0ff"/>
      <stop offset="0.55" stop-color="#8f6fff"/>
      <stop offset="1" stop-color="#6647e8"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g transform="translate(512 512) scale(1.56) translate(-551 -448)">
    <!-- bubbles: a stream rising from the mouth, then arcing right & down (the note flag) -->
    <g filter="url(#glow)">
      <circle cx="509" cy="185" r="6"  fill="url(#bub)"/>
      <circle cx="515" cy="216" r="13" fill="url(#bub)"/>
      <circle cx="528" cy="260" r="23" fill="url(#bub)"/>
      <circle cx="513" cy="311" r="16" fill="url(#bub)"/>
      <circle cx="538" cy="338" r="10" fill="url(#bub)"/>
      <circle cx="523" cy="375" r="23" fill="url(#bub)"/>
      <circle cx="507" cy="417" r="11" fill="url(#bub)"/>
      <circle cx="538" cy="414" r="9"  fill="url(#bub)"/>
      <circle cx="566" cy="280" r="8"  fill="url(#bub)"/>
      <circle cx="562" cy="313" r="16" fill="url(#bub)"/>
      <circle cx="595" cy="304" r="5"  fill="url(#bub)"/>
      <circle cx="603" cy="345" r="19" fill="url(#bub)"/>
      <circle cx="635" cy="357" r="4"  fill="url(#bub)"/>
      <circle cx="629" cy="385" r="15" fill="url(#bub)"/>
      <circle cx="628" cy="419" r="5"  fill="url(#bub)"/>
      <circle cx="651" cy="413" r="9"  fill="url(#bub)"/>
      <circle cx="648" cy="444" r="12" fill="url(#bub)"/>
      <circle cx="644" cy="474" r="10" fill="url(#bub)"/>
      <circle cx="628" cy="495" r="6"  fill="url(#bub)"/>
      <circle cx="611" cy="519" r="4"  fill="url(#bub)"/>
    </g>
    <!-- bubble highlights -->
    <circle cx="521" cy="252" r="7" fill="#e4dcff" opacity="0.9"/>
    <circle cx="516" cy="367" r="7" fill="#e4dcff" opacity="0.85"/>
    <circle cx="597" cy="339" r="6" fill="#e4dcff" opacity="0.8"/>
    <circle cx="624" cy="380" r="5" fill="#e4dcff" opacity="0.75"/>
    <circle cx="644" cy="440" r="4" fill="#e4dcff" opacity="0.7"/>
    <circle cx="557" cy="308" r="5" fill="#e4dcff" opacity="0.75"/>

    <!-- test tube (slim, merges into the note head) -->
    <g filter="url(#glow)">
      <rect x="489" y="482" width="54" height="186" rx="12" fill="url(#glass)"/>
    </g>
    <!-- liquid with a meniscus -->
    <path d="M 492 512 Q 505 504 516 510 Q 529 517 540 509 L 540 646 a 14 14 0 0 1 -14 14 h -24 a 14 14 0 0 1 -14 -14 Z" fill="url(#liquid)"/>
    <circle cx="512" cy="540" r="7"   fill="#171040" opacity="0.55"/>
    <circle cx="524" cy="572" r="4.5" fill="#171040" opacity="0.5"/>
    <circle cx="503" cy="600" r="4"   fill="#171040" opacity="0.45"/>
    <!-- glass highlight -->
    <rect x="495" y="492" width="8" height="160" rx="4" fill="#d9d0ff" opacity="0.55"/>
    <!-- rim -->
    <rect x="480" y="466" width="72" height="24" rx="11" fill="#7c5cff"/>
    <rect x="480" y="466" width="72" height="11" rx="5.5" fill="#a78bfa"/>

    <!-- note head -->
    <g filter="url(#glow)">
      <ellipse cx="456" cy="661" rx="88" ry="62" fill="url(#head)" transform="rotate(-16 456 661)"/>
    </g>
    <ellipse cx="424" cy="637" rx="30" ry="16" fill="#cabdff" opacity="0.75" transform="rotate(-16 424 637)"/>
  </g>
</svg>
